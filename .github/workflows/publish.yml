name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Ensure tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)." >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Package dry run
        run: npm pack --dry-run

      - name: Assert package privacy boundary
        run: |
          npm pack --json > /tmp/siteflow-pack.json
          node <<'NODE'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('/tmp/siteflow-pack.json', 'utf8'));
          const files = data[0].files.map(file => file.path);
          const allowed = [/^examples\/receipts\//];
          const forbidden = [/cookie/i, /receipt/i, /trace/i, /campaign/i, /profile/i, /\.env/i, /\.har$/i];
          const offenders = files.filter(file => !allowed.some(pattern => pattern.test(file)) && forbidden.some(pattern => pattern.test(file)));
          if (offenders.length) {
            console.error('Forbidden package files:', offenders.join('\n'));
            process.exit(1);
          }
          NODE

  publish:
    name: Publish package
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish with provenance
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_ANNOUNCEMENT.md
          generate_release_notes: false
