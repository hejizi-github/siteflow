<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Runtime Playground</title>
<style>
  body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
  h2 { margin-top: 0; }
  button, input, select, textarea { margin: 4px; padding: 6px 12px; }
  .notice { color: green; font-weight: bold; }
  .spacer { height: 200vh; }
</style>
</head>
<body>
<h1>Runtime Playground</h1>

<section id="click-targets">
  <h2>Click Targets</h2>
  <button id="btn-by-id">Button by ID</button>
  <button class="btn-class">Button by Class</button>
  <button aria-label="Aria Label Button">Aria Button</button>
  <button>Text Match Button</button>
  <div id="click-output" class="notice"></div>
</section>

<section id="type-targets">
  <h2>Type Targets</h2>
  <input id="text-input" type="text" placeholder="Type here">
  <input id="password-input" type="password" placeholder="Password">
  <textarea id="textarea-input" placeholder="Textarea"></textarea>
  <div id="type-output" class="notice"></div>
</section>

<section id="select-targets">
  <h2>Select Targets</h2>
  <select id="native-select">
    <option value="">Pick one</option>
    <option value="apple">Apple</option>
    <option value="banana">Banana</option>
    <option value="cherry">Cherry</option>
  </select>
  <div id="select-output" class="notice"></div>
</section>

<section id="upload-targets">
  <h2>Upload Target</h2>
  <input id="file-input" type="file">
</section>

<section id="scroll-area">
  <h2>Scroll Test</h2>
  <p>Scroll down to find marker.</p>
  <div class="spacer"></div>
  <p id="scroll-marker" class="notice">Scroll marker found!</p>
</section>

<section id="console-network">
  <h2>Console & Network</h2>
  <button id="log-btn">console.log</button>
  <button id="error-btn">console.error</button>
  <button id="fetch-btn">fetch /api/test</button>
  <div id="network-output" class="notice"></div>
</section>

<section id="storage-area">
  <h2>Storage</h2>
  <button id="set-storage">Set localStorage</button>
  <button id="clear-storage">Clear localStorage</button>
  <div id="storage-output" class="notice"></div>
</section>

<script>
  document.querySelector('#btn-by-id').addEventListener('click', () => {
    document.querySelector('#click-output').textContent = 'btn-by-id clicked';
  });
  document.querySelector('.btn-class').addEventListener('click', () => {
    document.querySelector('#click-output').textContent = 'btn-class clicked';
  });
  document.querySelector('[aria-label="Aria Label Button"]').addEventListener('click', () => {
    document.querySelector('#click-output').textContent = 'aria clicked';
  });
  document.querySelectorAll('button').forEach(btn => {
    if (btn.textContent.trim() === 'Text Match Button') {
      btn.addEventListener('click', () => {
        document.querySelector('#click-output').textContent = 'text match clicked';
      });
    }
  });
  const ti = document.querySelector('#text-input');
  ti.addEventListener('input', () => {
    document.querySelector('#type-output').textContent = 'value: ' + ti.value;
  });
  document.querySelector('#native-select').addEventListener('change', e => {
    document.querySelector('#select-output').textContent = 'selected: ' + e.target.value;
  });
  document.querySelector('#log-btn').addEventListener('click', () => {
    console.log('hello from fixture');
  });
  document.querySelector('#error-btn').addEventListener('click', () => {
    console.error('test error from fixture');
  });
  document.querySelector('#fetch-btn').addEventListener('click', async () => {
    try { await fetch('/api/test'); } catch (e) {
      document.querySelector('#network-output').textContent = 'fetch attempted';
    }
  });
  document.querySelector('#set-storage').addEventListener('click', () => {
    localStorage.setItem('fixture-key', 'fixture-value');
    document.querySelector('#storage-output').textContent = 'set';
  });
  document.querySelector('#clear-storage').addEventListener('click', () => {
    localStorage.clear();
    document.querySelector('#storage-output').textContent = 'cleared';
  });
</script>
</body>
</html>
