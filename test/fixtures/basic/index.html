<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>siteflow basic fixture</title>
  </head>
  <body>
    <h1>siteflow basic fixture</h1>
    <button id="run">Run</button>
    <input id="message" aria-label="Message" placeholder="Message">
    <button id="mode" type="button" role="combobox" aria-expanded="false">Mode</button>
    <div id="mode-options" role="listbox" hidden>
      <div role="option">Image</div>
      <div role="option">Video</div>
    </div>
    <div id="status">idle</div>
    <script src="./app.js"></script>
  </body>
</html>
